model:
  vit_variant: vit_tiny_patch16_224
  embed_dim: 192
  depth: 4
  num_heads: 4
  mlp_ratio: 4.0
  dropout: 0.1
  action_dim: 25
  pretrained: false
  encoder_type: cnn

training:
  lr: 0.0001
  weight_decay: 0.00001
  warmup_steps: 100
  max_steps: 5000
  batch_size: 16
  seq_length: 8
  alpha: 0.1
  use_amp: false
  amp_dtype: bfloat16
  checkpoint_interval: 500
  log_interval: 25
  data_dir: data/shards/treechop_full
  output_dir: checkpoints/wood_5000
  num_workers: 8
  persistent_workers: true
  prefetch_factor: 4
  skip_short: true
  wandb_project: wally-wood-5k
  early_stop: true
  early_stop_patience: 500
  early_stop_min_step: 1000
  early_stop_ema_alpha: 0.1
  early_stop_min_delta: 0.0
