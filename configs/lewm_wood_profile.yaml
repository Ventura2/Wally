model:
  vit_variant: vit_tiny_patch16_224
  embed_dim: 192
  depth: 4
  num_heads: 4
  mlp_ratio: 4.0
  dropout: 0.1
  action_dim: 25
  pretrained: false
  encoder_type: cnn

training:
  lr: 0.0001
  weight_decay: 0.00001
  warmup_steps: 2
  max_steps: 10
  batch_size: 4
  seq_length: 8
  alpha: 0.1
  use_amp: false
  amp_dtype: bfloat16
  checkpoint_interval: 10
  log_interval: 1
  data_dir: data/shards/treechop_smoke
  output_dir: checkpoints/wood_profiling
  num_workers: 0
  skip_short: true
  wandb_project: wally-wood-profiling
