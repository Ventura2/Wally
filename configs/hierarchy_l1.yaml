layers:
  - name: l1
    K: 32
    D: 64
    depth: 2
    heads: 4
    drift_epsilon: 0.10
l0_checkpoint: checkpoints/wood_1000/checkpoint_1000.pt
lr: 0.0001
weight_decay: 0.00001
warmup_steps: 200
max_steps: 10000
batch_size: 16
alpha: 0.1
seq_length: 64
checkpoint_interval: 500
log_interval: 50
output_dir: checkpoints/hierarchy_l1
data_dir: data/shards/treechop_full
num_workers: 4
persistent_workers: true
prefetch_factor: 4
use_concat_dataloader: true
