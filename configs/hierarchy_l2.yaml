layers:
  - name: l2
    K: 128
    D: 32
    depth: 2
    heads: 2
    drift_epsilon: 0.20
l0_checkpoint: checkpoints/wood_1000/checkpoint_1000.pt
lr: 0.00005
weight_decay: 0.00001
warmup_steps: 200
max_steps: 5000
batch_size: 8
alpha: 0.1
seq_length: 256
checkpoint_interval: 500
log_interval: 50
output_dir: checkpoints/hierarchy_l2
data_dir: data/shards/treechop_full
num_workers: 2
persistent_workers: true
prefetch_factor: 2
use_concat_dataloader: true
