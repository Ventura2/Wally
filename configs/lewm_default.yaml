model:
  vit_variant: vit_tiny_patch16_224
  embed_dim: 192
  depth: 4
  num_heads: 4
  mlp_ratio: 4.0
  dropout: 0.1
  action_dim: 25
  pretrained: false
  encoder_type: cnn

training:
  lr: 0.0001
  weight_decay: 0.00001
  warmup_steps: 500
  max_steps: 100000
  batch_size: 16
  seq_length: 16
  alpha: 0.1
  # VICReg auxiliary loss: decorrelates latent dims, prevents 1-D brightness collapse.
  # Set vicreg_weight > 0 to enable; std target = per-dim std, cov weight scales the off-diag penalty.
  vicreg_weight: 1.0
  vicreg_std_target: 1.0
  vicreg_cov_weight: 1.0
  use_amp: true
  amp_dtype: bfloat16
  checkpoint_interval: 1000
  log_interval: 100
  data_dir: data/shards/treechop_full
  output_dir: checkpoints
  num_workers: 8
  persistent_workers: true
  prefetch_factor: 4
  skip_short: true
  wandb_project: wally
