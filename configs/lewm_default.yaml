model:
  vit_variant: vit_tiny_patch16_224
  embed_dim: 192
  depth: 6
  num_heads: 4
  mlp_ratio: 4.0
  dropout: 0.1
  action_dim: 25
  pretrained: true

training:
  lr: 0.0001
  weight_decay: 0.00001
  warmup_steps: 1000
  max_steps: 100000
  batch_size: 8
  seq_length: 16
  alpha: 0.1
  use_amp: false
  checkpoint_interval: 1000
  log_interval: 10
  data_dir: data/shards/chunks
  output_dir: checkpoints
  num_workers: 0
  skip_short: true
  wandb_project: wally
