layers:
  - name: l1
    K: 4
    D: 64
    depth: 2
    heads: 4
    drift_epsilon: 0.10
l0_checkpoint: checkpoints/wood_10000/checkpoint_10000.pt
lr: 0.0001
weight_decay: 0.00001
warmup_steps: 200
max_steps: 5000
batch_size: 16
alpha: 0.1
seq_length: 16
checkpoint_interval: 500
log_interval: 50
output_dir: checkpoints/hierarchy_l1_5k
num_workers: 8
persistent_workers: true
prefetch_factor: 4
use_concat_dataloader: false
