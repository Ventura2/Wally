layers:
  - name: l1
    K: 4
    D: 64
    depth: 2
    heads: 4
    drift_epsilon: 0.10
l0_checkpoint: checkpoints/wood_1000/checkpoint_1000.pt
lr: 0.0001
weight_decay: 0.00001
warmup_steps: 50
max_steps: 200
batch_size: 16
alpha: 0.1
seq_length: 16
checkpoint_interval: 100
log_interval: 20
output_dir: checkpoints/hierarchy_l1_smoke
use_concat_dataloader: false
