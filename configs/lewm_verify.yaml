model:
  vit_variant: vit_tiny_patch16_224
  embed_dim: 192
  depth: 4
  num_heads: 4
  mlp_ratio: 4.0
  dropout: 0.1
  action_dim: 25
  pretrained: false
  encoder_type: cnn

training:
  lr: 0.0001
  weight_decay: 0.00001
  warmup_steps: 50
  max_steps: 500
  batch_size: 16
  seq_length: 16
  alpha: 0.1
  use_amp: true
  amp_dtype: bfloat16
  checkpoint_interval: 250
  log_interval: 25
  data_dir: data/shards/chunks
  output_dir: checkpoints/verify
  num_workers: 4
  persistent_workers: true
  prefetch_factor: 2
  skip_short: true
  wandb_project: wally
