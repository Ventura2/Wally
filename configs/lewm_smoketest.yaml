model:
  vit_variant: vit_tiny_patch16_224
  embed_dim: 192
  depth: 4
  num_heads: 4
  mlp_ratio: 4.0
  dropout: 0.1
  action_dim: 25
  pretrained: false
  encoder_type: cnn

training:
  lr: 0.0001
  weight_decay: 0.00001
  warmup_steps: 5
  max_steps: 30
  batch_size: 4
  seq_length: 16
  alpha: 0.1
  use_amp: true
  amp_dtype: bfloat16
  checkpoint_interval: 30
  log_interval: 2
  data_dir: data/shards/treechop_full
  output_dir: checkpoints_test
  num_workers: 0
  skip_short: true
  wandb_project: wally-smoketest
